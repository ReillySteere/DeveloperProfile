name: Quality Gates

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v6

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=high

  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v6

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🛣️ Generate Routes
        run: npm run generate-routes

      - name: 📐 Check Formatting
        run: npm run check-format

      - name: 🧐 Lint Code
        run: npm run lint

      - name: 🔎 Type Check
        run: npm run type-check

      - name: 🕸️ Verify Architecture
        run: npm run depcruise:verify

      - name: 🔄 Verify Migration Idempotency
        run: npm run verify:migrations

  unit-tests:
    name: Unit Tests & SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🛣️ Generate Routes
        run: npm run generate-routes

      - name: 🧪 Run Server Tests
        run: npm run test:server
        env:
          CI: true

      - name: 🧪 Run UI Tests
        run: npm run test:ui
        env:
          CI: true

      - name: SonarCloud Scan
        run: npx @sonar/scan
        env:
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v6

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: 📥 Install Dependencies
        run: npm ci

      - name: 🛣️ Generate Routes
        run: npm run generate-routes

      - name: 🏗️ Build Application
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: 🎭 Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true
          JWT_AUTH_SECRET: test-secret

      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v6

      - name: 🐳 Docker Build
        run: docker build . --file Dockerfile --tag profile-app:latest
