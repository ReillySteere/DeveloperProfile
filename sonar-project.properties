# SonarCloud Configuration
# https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/

sonar.projectKey=ReillySteere_DeveloperProfile
sonar.organization=reillysteere

# Source configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,src/ui/routeTree.gen.ts,src/server/migrations/**

# Coverage - separate reports from server and UI test runs
sonar.javascript.lcov.reportPaths=coverage/server/lcov.info,coverage/ui/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8